name: Reset Database
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why?"
        required: false
        default: "Manual reset"

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run seed
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
